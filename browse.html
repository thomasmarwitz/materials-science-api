<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Concepts</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #1a2b28;
        --muted: #5b7a75;
        --line: #dbf0ec;
        --accent: #40b0a1;
        --accent-hover: #eaf6f4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 16px 48px;
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
      }

      .muted {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 14px;
      }

      input,
      button {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.95rem;
        background: #fff;
      }

      input:focus {
        border-color: var(--accent);
        outline: none;
        box-shadow: 0 0 0 3px var(--accent-hover);
      }

      input {
        flex: 1;
        min-width: 220px;
      }

      button {
        cursor: pointer;
        transition: all 0.2s ease;
      }

      button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      button.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      button.primary:hover {
        background: #369a8d;
        color: #fff;
        border-color: #369a8d;
      }

      .index-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
      }

      .index-btn {
        min-width: 34px;
        text-align: center;
        padding: 6px 8px;
        font-size: 0.85rem;
      }

      .list {
        max-height: 68vh;
        overflow: auto;
        margin-top: 12px;
        border-top: 1px solid var(--line);
      }

      .pager {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .section-header {
        position: sticky;
        top: 0;
        background: #fff;
        border-bottom: 1px solid var(--line);
        padding: 10px 4px;
        font-weight: 600;
      }

      .concept-item {
        padding: 11px 4px;
        border-bottom: 1px solid var(--line);
        color: inherit;
        text-decoration: none;
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .concept-link {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        min-width: 0;
        color: inherit;
        text-decoration: none;
      }

      .help-btn {
        width: 30px;
        height: 30px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: var(--text);
        font-weight: 600;
        line-height: 1;
      }

      .concept-item:hover {
        background: var(--accent-hover);
        border-color: var(--accent);
      }

      .concept-item.exact-match {
        background: var(--accent-hover);
        border-left: 3px solid var(--accent);
      }

      .rank {
        min-width: 40px;
        color: var(--muted);
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .badge {
        margin-left: auto;
        border: 1px solid var(--accent);
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 0.72rem;
        color: var(--accent);
        background: var(--accent-hover);
      }

      .concept-item:last-child {
        border-bottom: 0;
      }

      @media (max-width: 700px) {
        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .pager {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>All Concepts</h1>
      <p class="muted">Alphabetical browse with quick jump indexing.</p>

      <div class="toolbar">
        <input id="filterInput" type="text" placeholder="Filter concepts..." />
        <button id="backBtn">Back to Search</button>
      </div>
      <div id="indexRow" class="index-row"></div>
      <p id="meta" class="muted" style="margin-top: 10px"></p>
      <div id="list" class="list"></div>
      <div class="pager" id="pager">
        <div class="toolbar" style="margin-top: 0">
          <button id="prevBtn">Prev</button>
          <button id="nextBtn">Next</button>
        </div>
        <span id="pageInfo" class="muted"></span>
      </div>
    </main>

    <script type="module">
      const filterInput = document.getElementById("filterInput");
      const backBtn = document.getElementById("backBtn");
      const indexRow = document.getElementById("indexRow");
      const list = document.getElementById("list");
      const meta = document.getElementById("meta");
      const pager = document.getElementById("pager");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const pageInfo = document.getElementById("pageInfo");

      let allConcepts = [];
      let visibleConcepts = [];
      let currentFilterQuery = "";

      const ALL_BUCKETS = ["#", ...Array.from({ length: 26 }, (_, i) => String.fromCodePoint(65 + i))];
      let activeBuckets = [];
      let groupedConcepts = new Map();
      let currentBucket = "#";

      function firstBucket(concept) {
        const ch = (concept?.trim()?.charAt(0) || "#").toUpperCase();
        return /[A-Z]/.test(ch) ? ch : "#";
      }

      function updateGroups() {
        groupedConcepts.clear();
        for (const bucket of ALL_BUCKETS) {
          groupedConcepts.set(bucket, []);
        }
        for (const concept of visibleConcepts) {
          const bucket = firstBucket(concept);
          groupedConcepts.get(bucket).push(concept);
        }
        activeBuckets = ALL_BUCKETS.filter((b) => groupedConcepts.get(b).length > 0);
        if (!activeBuckets.includes(currentBucket) && activeBuckets.length > 0) {
          currentBucket = activeBuckets[0];
        }
      }

      function renderIndexButtons() {
        indexRow.innerHTML = ALL_BUCKETS
          .map((bucket) => {
            const isEmpty = !activeBuckets.includes(bucket);
            return `<button class="index-btn" data-bucket="${bucket}" ${
              isEmpty ? 'disabled style="opacity:0.5"' : ""
            }>${bucket}</button>`;
          })
          .join("");

        indexRow.querySelectorAll(".index-btn").forEach((button) => {
          button.addEventListener("click", () => {
            const bucket = button.dataset.bucket;
            if (activeBuckets.includes(bucket)) {
              currentBucket = bucket;
              renderList();
              list.scrollTop = 0;
            }
          });
        });
      }

      function renderList() {
        if (visibleConcepts.length === 0) {
          list.innerHTML = '<div class="concept-item">No concepts found.</div>';
          meta.textContent = "0 concepts";
          pageInfo.textContent = "0 results";
          prevBtn.disabled = true;
          nextBtn.disabled = true;
          indexRow.style.display = "none";
          pager.style.display = "flex";
          return;
        }

        if (visibleConcepts.length <= 500) {
          indexRow.style.display = "none";
          pager.style.display = "none";
          
          const itemsHTML = visibleConcepts
            .map((concept, idx) => {
              const rank = idx + 1;
              const isExact =
                currentFilterQuery && concept.trim().toLowerCase() === currentFilterQuery;
              return `
                  <div class="concept-item ${isExact ? "exact-match" : ""}">
                    <a class="concept-link" href="/prediction?concept=${encodeURIComponent(concept)}">
                      <span class="rank">${rank}.</span>
                      <span>${concept}</span>
                    </a>
                    ${isExact ? '<span class="badge">exact</span>' : ""}
                    <a
                      class="help-btn"
                      href="/concept-mentions?concept=${encodeURIComponent(concept)}"
                      aria-label="Show mentions for ${concept}"
                      title="Show mentions"
                    >?</a>
                  </div>
                `;
            })
            .join("");

          list.innerHTML = itemsHTML;
          meta.textContent = `${visibleConcepts.length} concepts`;
          return;
        }

        indexRow.style.display = "flex";
        pager.style.display = "flex";
        renderIndexButtons();

        indexRow.querySelectorAll(".index-btn").forEach((btn) => {
          if (btn.dataset.bucket === currentBucket) {
            btn.style.background = "var(--accent)";
            btn.style.color = "#fff";
            btn.style.borderColor = "var(--accent)";
          } else {
            btn.style.background = "";
            btn.style.color = "";
            btn.style.borderColor = "";
          }
        });

        const conceptsInBucket = groupedConcepts.get(currentBucket) || [];

        let bucketStartOffset = 0;
        for (const b of activeBuckets) {
          if (b === currentBucket) break;
          bucketStartOffset += groupedConcepts.get(b).length;
        }

        const itemsHTML = conceptsInBucket
          .map((concept, idx) => {
            const rank = bucketStartOffset + idx + 1;
            const isExact =
              currentFilterQuery && concept.trim().toLowerCase() === currentFilterQuery;
            return `
                  <div class="concept-item ${isExact ? "exact-match" : ""}">
                    <a class="concept-link" href="/prediction?concept=${encodeURIComponent(concept)}">
                      <span class="rank">${rank}.</span>
                      <span>${concept}</span>
                    </a>
                    ${isExact ? '<span class="badge">exact</span>' : ""}
                    <a
                      class="help-btn"
                      href="/concept-mentions?concept=${encodeURIComponent(concept)}"
                      aria-label="Show mentions for ${concept}"
                      title="Show mentions"
                    >?</a>
                  </div>
                `;
          })
          .join("");

        list.innerHTML = `
              <section id="bucket-${currentBucket}">
                <div class="section-header">${currentBucket}</div>
                ${itemsHTML}
              </section>
            `;

        meta.textContent = `${visibleConcepts.length} concepts`;
        pageInfo.textContent = `Letter ${currentBucket}: ${conceptsInBucket.length} results`;

        const bucketIdx = activeBuckets.indexOf(currentBucket);
        prevBtn.disabled = bucketIdx <= 0;
        nextBtn.disabled = bucketIdx >= activeBuckets.length - 1;
      }

      function applyFilter(doRender = true) {
        const query = filterInput.value.trim().toLowerCase();
        currentFilterQuery = query;

        if (query) {
          visibleConcepts = allConcepts.filter((concept) => concept.toLowerCase().includes(query));
        } else {
          visibleConcepts = allConcepts;
        }

        updateGroups();

        if (doRender) {
          renderList();
        }
      }

      async function loadConcepts() {
        meta.textContent = "Loading concepts...";
        list.innerHTML = "";

        try {
          const res = await fetch("/concepts");
          const data = await res.json();
          allConcepts = Array.isArray(data.items) ? data.items : [];
          allConcepts.sort((a, b) => a.localeCompare(b, "en", { sensitivity: "base" }));
          
          applyFilter(false);
          renderList();
        } catch (error) {
          list.innerHTML = `<div class="concept-item">Error loading concepts: ${error.message}</div>`;
          meta.textContent = "Failed to load concepts.";
        }
      }

      backBtn.addEventListener("click", () => {
        globalThis.location.href = "/";
      });

      filterInput.addEventListener("input", applyFilter);

      prevBtn.addEventListener("click", () => {
        const bucketIdx = activeBuckets.indexOf(currentBucket);
        if (bucketIdx > 0) {
          currentBucket = activeBuckets[bucketIdx - 1];
          renderList();
          list.scrollTop = 0;
        }
      });

      nextBtn.addEventListener("click", () => {
        const bucketIdx = activeBuckets.indexOf(currentBucket);
        if (bucketIdx < activeBuckets.length - 1) {
          currentBucket = activeBuckets[bucketIdx + 1];
          renderList();
          list.scrollTop = 0;
        }
      });

      await loadConcepts();
    </script>
  </body>
</html>
