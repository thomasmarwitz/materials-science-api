<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prediction Results</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #1a2b28;
        --muted: #5b7a75;
        --line: #dbf0ec;
        --accent: #40b0a1;
        --accent-hover: #eaf6f4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 16px 48px;
      }

      .topbar {
        display: flex;
        justify-content: flex-start;
        gap: 8px;
      }

      .icon-btn {
        width: 34px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--text);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        transition: all 0.2s ease;
      }

      .icon-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-hover);
      }

      h1 {
        margin: 8px 0 0;
        font-size: 1.35rem;
      }

      .muted {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .toolbar {
        margin-top: 12px;
      }

      .concept-input {
        width: 100%;
        border: 1px solid var(--accent);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.95rem;
        background: var(--accent-hover);
        color: var(--text);
        font-weight: 500;
      }

      .concept-input:focus {
        outline: none;
        box-shadow: 0 0 0 3px var(--accent-hover);
        border-color: var(--accent);
      }

      .meta {
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .results {
        margin-top: 12px;
        border-top: 1px solid var(--line);
        max-height: 72vh;
        overflow: auto;
      }

      .status {
        padding: 14px 4px;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
      }

      .status.warn {
        color: #7a5a00;
      }

      .status-actions {
        margin-top: 10px;
      }

      .status-retry-btn {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 0.9rem;
        background: #fff;
        color: var(--text);
        cursor: pointer;
      }

      .status-retry-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-hover);
      }

      .row {
        display: grid;
        grid-template-columns: 52px 1fr 140px;
        gap: 12px;
        align-items: center;
        padding: 12px 4px;
        border-bottom: 1px solid var(--line);
      }

      .rank {
        color: var(--muted);
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .concept {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .score-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .help-btn {
        width: 28px;
        height: 28px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--text);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-weight: 600;
        line-height: 1;
      }

      .save-btn {
        width: 28px;
        height: 28px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--text);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        line-height: 1;
      }

      .save-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-hover);
      }

      .save-btn.saved {
        border-color: var(--accent);
        color: #fff;
        background: var(--accent);
      }

      .score {
        min-width: 58px;
        text-align: right;
        font-variant-numeric: tabular-nums;
        color: var(--accent);
        font-size: 0.85rem;
        font-weight: 500;
      }

      @media (max-width: 760px) {
        .container {
          padding-top: 10px;
        }

        h1 {
          font-size: 1.25rem;
        }

        .row {
          grid-template-columns: 44px 1fr;
          grid-template-rows: auto auto;
        }

        .score-wrap {
          grid-column: 2;
        }

        .status {
          white-space: normal;
          overflow: visible;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="topbar">
        <button id="backBtn" class="icon-btn" aria-label="Back to Search" title="Back to Search">←</button>
        <button id="savedBtn" class="icon-btn" aria-label="Saved Concepts" title="Saved Concepts">💾</button>
      </div>

      <h1>Prediction Results</h1>
      <p class="muted">Top 200 predictions for the selected concept.</p>

      <div class="toolbar">
        <input id="conceptInput" class="concept-input" type="text" placeholder="Concept" readonly />
      </div>

      <p id="meta" class="meta">Loading...</p>
      <div id="results" class="results"></div>
    </main>

    <script type="module">
      const conceptInput = document.getElementById("conceptInput");
      const backBtn = document.getElementById("backBtn");
      const savedBtn = document.getElementById("savedBtn");
      const meta = document.getElementById("meta");
      const resultsEl = document.getElementById("results");
      const SAVED_PAIRS_KEY = "savedConceptPairs";
      const BUSY_RETRY_BASE_DELAY_MS = 700;
      const BUSY_RETRY_MAX_DELAY_MS = 10000;
      const MAX_BUSY_RETRIES = 5;

      function getConceptFromUrl() {
        const url = new URL(globalThis.location.href);
        return (url.searchParams.get("concept") || "").trim();
      }

      function setConceptInUrl(concept) {
        const url = new URL(globalThis.location.href);
        url.searchParams.set("concept", concept);
        globalThis.history.replaceState({}, "", url);
      }

      function normalize(value, min, max) {
        if (max <= min) {
          return 0.5;
        }
        return (value - min) / (max - min);
      }

      function renderStatus(message, variant = "", showRetryButton = false) {
        const safeVariant = variant ? ` ${variant}` : "";
        const actions = showRetryButton
          ? '<div class="status-actions"><button id="statusRetryBtn" class="status-retry-btn" type="button">Retry now</button></div>'
          : "";

        resultsEl.innerHTML = `<div class="status${safeVariant}">${message}${actions}</div>`;

        if (showRetryButton) {
          const retryButton = document.getElementById("statusRetryBtn");
          if (retryButton) {
            retryButton.addEventListener("click", () => {
              runPrediction();
            });
          }
        }
      }

      function sleep(ms) {
        return new Promise((resolve) => {
          globalThis.setTimeout(resolve, ms);
        });
      }

      function getBackoffDelayMs(retryNumber) {
        const exponential = BUSY_RETRY_BASE_DELAY_MS * 2 ** (retryNumber - 1);
        return Math.min(exponential, BUSY_RETRY_MAX_DELAY_MS);
      }

      async function waitWithRetryCountdown(concept, retryNumber, requestInfo, backoffMs) {
        let remainingSeconds = Math.max(1, Math.ceil(backoffMs / 1000));

        while (remainingSeconds > 0) {
          meta.textContent = `Another prediction is currently running${requestInfo}. Retrying in ${remainingSeconds}s... (${retryNumber}/${MAX_BUSY_RETRIES})`;
          renderStatus(
            `Server is processing another prediction. Auto-retrying in ${remainingSeconds}s...`,
            "warn"
          );

          await sleep(1000);
          remainingSeconds -= 1;
        }
      }

      function parseErrorPayload(text) {
        try {
          const parsed = JSON.parse(text || "{}");
          return {
            detail: typeof parsed.detail === "string" ? parsed.detail : "",
            requestId: typeof parsed.request_id === "string" ? parsed.request_id : "",
          };
        } catch {
          return { detail: "", requestId: "" };
        }
      }

      function loadSavedPairs() {
        try {
          const raw = globalThis.localStorage.getItem(SAVED_PAIRS_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function persistSavedPairs(items) {
        globalThis.localStorage.setItem(SAVED_PAIRS_KEY, JSON.stringify(items));
      }

      function normalizeText(value) {
        return String(value || "").trim().toLowerCase();
      }

      function isPairSaved(origin, suggestion) {
        const saved = loadSavedPairs();
        const normalizedOrigin = normalizeText(origin);
        const normalizedSuggestion = normalizeText(suggestion);

        return saved.some(
          (item) =>
            normalizeText(item.origin) === normalizedOrigin &&
            normalizeText(item.suggestion) === normalizedSuggestion
        );
      }

      function savePair(origin, suggestion) {
        const originConcept = String(origin || "").trim();
        const predictedConcept = String(suggestion || "").trim();

        if (!originConcept || !predictedConcept) {
          return false;
        }

        const items = loadSavedPairs();
        const alreadySaved = items.some(
          (item) =>
            normalizeText(item.origin) === normalizeText(originConcept) &&
            normalizeText(item.suggestion) === normalizeText(predictedConcept)
        );

        if (alreadySaved) {
          return false;
        }

        items.unshift({
          origin: originConcept,
          suggestion: predictedConcept,
          createdAt: new Date().toISOString(),
        });
        persistSavedPairs(items);
        return true;
      }

      function renderResults(items) {
        if (!items.length) {
          renderStatus("No results.");
          return;
        }

        resultsEl.innerHTML = items
          .map((item, index) => {
            const score = Number(item.score) || 0;
            const saved = isPairSaved(conceptInput.value.trim(), item.concept);

            return `
              <div class="row">
                <span class="rank">${index + 1}.</span>
                <span class="concept">${item.concept}</span>
                <span class="score-wrap">
                  <button
                    class="save-btn ${saved ? "saved" : ""}"
                    type="button"
                    data-concept="${encodeURIComponent(item.concept)}"
                    aria-label="Save concept pair"
                    title="${saved ? "Saved" : "Save suggestion"}"
                  >${saved ? "✓" : "💾"}</button>
                  <button
                    class="help-btn"
                    type="button"
                    data-concept="${encodeURIComponent(item.concept)}"
                    aria-label="Show mentions"
                    title="Show mentions"
                  >?</button>
                  <span class="score">${score.toFixed(4)}</span>
                </span>
              </div>
            `;
          })
          .join("");

        resultsEl.querySelectorAll(".save-btn").forEach((button) => {
          button.addEventListener("click", () => {
            const savedConcept = decodeURIComponent(button.dataset.concept || "");
            const originConcept = conceptInput.value.trim();
            const didSave = savePair(originConcept, savedConcept);

            if (didSave || isPairSaved(originConcept, savedConcept)) {
              button.classList.add("saved");
              button.textContent = "✓";
              button.title = "Saved";
            }
          });
        });

        resultsEl.querySelectorAll(".help-btn").forEach((button) => {
          button.addEventListener("click", () => {
            const conceptParam = button.dataset.concept || "";
            globalThis.location.href = `./concept-mentions?concept=${conceptParam}`;
          });
        });
      }

      async function runPrediction() {
        const concept = conceptInput.value.trim();

        if (!concept) {
          meta.textContent = "Select a concept from search first.";
          renderStatus("Prediction results appear here.");
          return;
        }

        meta.textContent = "Running prediction...";
        renderStatus("Loading prediction results...");

        for (let attempt = 0; attempt <= MAX_BUSY_RETRIES; attempt += 1) {
          try {
            const res = await fetch(`./predict?concept=${encodeURIComponent(concept)}&k=200`);
            const requestIdHeader = (res.headers.get("x-request-id") || "").trim();
            const text = await res.text();

            if (!res.ok) {
              const payload = parseErrorPayload(text);
              const detail = payload.detail || text || `HTTP ${res.status}`;
              const requestId = payload.requestId || requestIdHeader;

              const isBusy =
                res.status === 503 &&
                detail.toLowerCase().includes("busy handling predict requests");

              if (isBusy && attempt < MAX_BUSY_RETRIES) {
                const retryNumber = attempt + 1;
                const backoffMs = getBackoffDelayMs(retryNumber);
                const requestInfo = requestId ? ` (request ${requestId})` : "";
                await waitWithRetryCountdown(
                  concept,
                  retryNumber,
                  requestInfo,
                  backoffMs
                );
                continue;
              }

              if (isBusy) {
                const requestInfo = requestId ? ` (request ${requestId})` : "";
                meta.textContent = `Prediction pending for "${concept}".`;
                renderStatus(
                  `Server is still busy with another prediction${requestInfo}. Please try again in a few seconds.`,
                  "warn",
                  true
                );
                return;
              }

              if (res.status === 404) {
                meta.textContent = `Prediction failed for "${concept}".`;
                renderStatus("Concept was not found. Go back and select a valid concept.", "warn");
                return;
              }

              if (res.status === 422) {
                meta.textContent = `Prediction failed for "${concept}".`;
                renderStatus("Invalid prediction request. Please retry from search.", "warn");
                return;
              }

              const requestInfo = requestId ? ` (request ${requestId})` : "";
              meta.textContent = `Prediction failed for "${concept}".`;
              renderStatus(`Request failed with HTTP ${res.status}${requestInfo}.`, "warn");
              return;
            }

            const acceptedInfo = requestIdHeader ? ` (request ${requestIdHeader})` : "";
            meta.textContent = `Request accepted by server${acceptedInfo}. Processing results...`;
            renderStatus("Request accepted. Building prediction results...");

            const data = JSON.parse(text);
            const items = Array.isArray(data) ? data : [];

            setConceptInUrl(concept);
            meta.textContent = `${items.length} predictions`;
            renderResults(items);
            return;
          } catch (error) {
            console.error("Prediction request failed", error);
            meta.textContent = `Prediction failed for "${concept}".`;
            renderStatus("Network or server error while loading predictions.", "warn");
            return;
          }
        }
      }

      backBtn.addEventListener("click", () => {
        if (globalThis.history.length > 1) {
          globalThis.history.back();
        } else {
          globalThis.location.href = "./";
        }
      });

      savedBtn.addEventListener("click", () => {
        globalThis.location.href = "./saved-concepts";
      });

      const initialConcept = getConceptFromUrl();
      conceptInput.value = initialConcept;
      await runPrediction();
    </script>
  </body>
</html>
