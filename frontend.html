<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Concept Search</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #1a2b28;
        --muted: #5b7a75;
        --line: #dbf0ec;
        --accent: #40b0a1;
        --accent-hover: #eaf6f4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 16px 48px;
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 700;
      }

      .muted {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 14px;
      }

      input,
      button {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.95rem;
        background: #fff;
        color: var(--text);
      }

      input[type="text"]:focus {
        border-color: var(--accent);
        outline: none;
        box-shadow: 0 0 0 3px var(--accent-hover);
      }

      input[type="text"] {
        flex: 1;
        min-width: 0;
      }

      button {
        cursor: pointer;
        transition: all 0.2s ease;
      }

      button:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
      }

      button.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      button.primary:hover:not(:disabled) {
        background: #369a8d;
        color: #fff;
        border-color: #369a8d;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .list {
        margin-top: 12px;
        max-height: 72vh;
        overflow: auto;
        border-top: 1px solid var(--line);
      }

      .item {
        padding: 12px 4px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: inherit;
      }

      .item:hover {
        background: var(--accent-hover);
        border-color: var(--accent);
      }

      .item.exact-match {
        background: var(--accent-hover);
        border-left: 3px solid var(--accent);
      }

      .rank {
        min-width: 34px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        text-align: right;
      }

      .badge {
        margin-left: auto;
        border: 1px solid var(--accent);
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 0.72rem;
        color: var(--accent);
        background: var(--accent-hover);
      }

      .concept {
        font-weight: 600;
      }

      .meta {
        margin-top: 10px;
        font-size: 0.85rem;
        color: var(--muted);
      }

      @media (max-width: 700px) {
        .row {
          align-items: flex-start;
        }

        .toolbar {
          width: 100%;
          flex-wrap: wrap;
        }

        .item {
          padding-left: 0;
          padding-right: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Concept Search</h1>
      <p class="muted">Search concepts and tap one result to open predictions.</p>

      <div class="row">
        <input id="searchInput" type="text" placeholder="Search concepts..." />
        <button id="searchBtn" class="primary">Search</button>
      </div>
      <div class="toolbar">
        <button id="browseBtn">📚 Browse all concepts</button>
        <button id="savedBtn">💾 Saved concepts</button>
      </div>

      <p id="searchMeta" class="meta"></p>
      <div id="searchResults" class="list"></div>
    </main>

    <script>
      const searchInput = document.getElementById("searchInput");
      const searchBtn = document.getElementById("searchBtn");
      const browseBtn = document.getElementById("browseBtn");
      const searchMeta = document.getElementById("searchMeta");
      const searchResults = document.getElementById("searchResults");
        const savedBtn = document.getElementById("savedBtn");

      const searchState = {
        items: [],
        query: "",
      };

      function setLoading(button, loading, text) {
        button.disabled = loading;
        if (loading) {
          button.dataset.original = button.textContent;
          button.textContent = text;
        } else if (button.dataset.original) {
          button.textContent = button.dataset.original;
        }
      }

      function renderSearchResults() {
        if (!searchState.items.length) {
          searchResults.innerHTML = '<div class="item"><span>No results.</span></div>';
          return;
        }

        const normalizedQuery = searchState.query.trim().toLowerCase();

        searchResults.innerHTML = searchState.items
          .map((concept, index) => {
            const isExact = normalizedQuery && concept.trim().toLowerCase() === normalizedQuery;

            return `
              <a class="item predict-link ${isExact ? "exact-match" : ""}" href="./prediction?concept=${encodeURIComponent(concept)}">
                <span class="rank">${index + 1}.</span>
                <span class="concept">${concept}</span>
                ${isExact ? '<span class="badge">exact</span>' : ""}
              </a>
            `;
          })
          .join("");
      }

      async function runSearch() {
        const query = searchInput.value.trim();
        if (!query) {
          searchMeta.textContent = "Enter a search term.";
          return;
        }

        setLoading(searchBtn, true, "Searching...");
        searchMeta.textContent = `Searching for "${query}"...`;

        try {
          const res = await fetch(`./search?query=${encodeURIComponent(query)}`);
          const data = await res.json();
          const concepts = (Array.isArray(data) ? data : []).map((item) =>
            typeof item === "string" ? item : item.concept
          );

          searchState.items = concepts;
          searchState.query = query;
          searchMeta.textContent = `Found ${concepts.length} results for "${query}".`;
          renderSearchResults();
        } catch (error) {
          searchMeta.textContent = "Search failed.";
          searchResults.innerHTML = `<div class="item"><span>Error: ${error.message}</span></div>`;
        } finally {
          setLoading(searchBtn, false);
        }
      }

      searchBtn.addEventListener("click", runSearch);
      searchInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          runSearch();
        }
      });

      browseBtn.addEventListener("click", () => {
        globalThis.location.href = "./browse";
      });
        savedBtn.addEventListener("click", () => {
          globalThis.location.href = "./saved-concepts";
        });

      searchResults.innerHTML = '<div class="item"><span>Start by searching a concept.</span></div>';
    </script>
  </body>
</html>
